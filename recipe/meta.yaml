{% set name = "itslive" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/itslive-{{ version }}.tar.gz
  sha256: 9eb9b05b182cbc90e46db3ab452a110e49ec590811ceda6563a2d4d2a6c0cc98

build:
  entry_points:
    - itslive-export = itslive.cli.export:export
    - itslive-plot = itslive.cli.plot:plot
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.0.0
    - pip
  run:
    - boto3 >=1.28
    - python >={{ python_min }}
    - shapely >=1.8
    - matplotlib-base >=3.6
    - pandas >=1.5.1
    - plotext >=0
    - pyproj >=3.3
    - requests >=2.28.1
    - rich-click >=1.5
    - s3fs >=2022.3
    - tabulate >=0.9.0
    - xarray >=2022.3
    - zarr >=2.11
    - earthaccess >=0.5.2
    - pqdm >=0.2.0

test:
  imports:
    - itslive
  commands:
    - pip check
    - itslive-export --help
    - itslive-plot --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nasa-jpl/itslive-py
  dev_url: https://github.com/nasa-jpl/itslive-py
  summary: Python client for ITSLIVE glacier velocity data.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - weiji14
    - betolink
    - jhkennedy
